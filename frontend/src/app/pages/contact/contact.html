<main class="contact-page">
  <app-navbar></app-navbar>

  <section class="contact-page__content">
    <article class="contact-card">
      <h1 class="contact-card__title text-28-black-uc text-main-color">Contact</h1>
      <p class="contact-card__intro text-12-regular text-muted-color">
        Have a question or suggestion? Message us and we will get back to you as soon as we can.
      </p>

      <div class="contact-card__form">
        <app-auth-input label="NAME" placeholder="Enter your name"></app-auth-input>
        <app-auth-input
          label="EMAIL"
          placeholder="Enter your email"
          type="email"
        ></app-auth-input>
        <app-auth-input label="SUBJECT" placeholder="Message subject"></app-auth-input>
        <app-auth-input label="MESSAGE" placeholder="Write your message"></app-auth-input>
      </div>

      <div class="contact-card__actions">
        <app-button
          variant="log-in"
          [labelOverride]="'SEND MESSAGE'"
          [fullWidth]="true"
        ></app-button>
      </div>
    </article>
  </section>

  <app-footer></app-footer>
</main>
