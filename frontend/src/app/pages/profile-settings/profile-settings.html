<main class="profile-settings-page">
  <app-navbar variant="default-logged"></app-navbar>

  <section class="profile-settings-page__content">
    <div class="profile-settings-page__layout">
      <app-profile-header-card></app-profile-header-card>

      <article class="profile-settings-page__card">
        <h1 class="profile-settings-page__title text-28-black-uc text-main-color">Ustawienia konta</h1>

        <div class="profile-settings-page__form">
          <app-auth-input label="NICK" placeholder="Wpisz nowy nick"></app-auth-input>
          <app-auth-input
            label="ADRES E-MAIL"
            placeholder="Wpisz nowy adres e-mail"
            type="email"
          ></app-auth-input>
          <app-auth-input
            label="OBECNE HASŁO"
            placeholder="Wpisz obecne hasło"
            type="password"
          ></app-auth-input>
          <app-auth-input
            label="NOWE HASŁO"
            placeholder="Wpisz nowe hasło"
            type="password"
          ></app-auth-input>
        </div>

        <div class="profile-settings-page__actions">
          <app-button
            variant="profile-settings"
            [labelOverride]="'ANULUJ ZMIANY'"
            [fullWidth]="true"
          ></app-button>
          <app-button
            variant="log-in"
            [labelOverride]="'ZAPISZ ZMIANY'"
            [fullWidth]="true"
          ></app-button>
        </div>
      </article>
    </div>
  </section>

  <app-footer></app-footer>
</main>
