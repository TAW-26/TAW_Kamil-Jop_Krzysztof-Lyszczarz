<main class="profile-settings-page">
  <app-navbar></app-navbar>

  <section class="profile-settings-page__content">
    <div class="profile-settings-page__layout">
      <app-profile-header-card></app-profile-header-card>

      <article class="profile-settings-page__card">
        <h1 class="profile-settings-page__title text-28-black-uc text-main-color">Account settings</h1>
        <p *ngIf="error() as err" class="profile-settings-page__error text-12-regular" role="alert">{{ err }}</p>

        <div class="profile-settings-page__form">
          <app-auth-input
            label="USERNAME"
            placeholder="Enter a new username"
            [(value)]="username"
            [disabled]="isSubmitting()"
          ></app-auth-input>
          <app-auth-input
            label="CURRENT PASSWORD"
            placeholder="Enter your current password"
            type="password"
            [(value)]="currentPassword"
            [disabled]="isSubmitting()"
          ></app-auth-input>
          <app-auth-input
            label="NEW PASSWORD"
            placeholder="Enter a new password"
            type="password"
            [(value)]="newPassword"
            [disabled]="isSubmitting()"
          ></app-auth-input>
        </div>

        <div class="profile-settings-page__actions">
          <app-button
            variant="profile-settings"
            [labelOverride]="'DISCARD CHANGES'"
            [fullWidth]="true"
            [disabled]="isSubmitting()"
            (click)="discardChanges()"
          ></app-button>
          <app-button
            class="profile-settings-page__save-btn"
            variant="log-in"
            [labelOverride]="isSubmitting() ? 'SAVING…' : 'SAVE CHANGES'"
            [fullWidth]="true"
            [disabled]="isSubmitting()"
            (click)="saveChanges()"
          ></app-button>
        </div>
      </article>
    </div>
  </section>

  <app-footer></app-footer>
</main>
