<main class="forgot-password-page">
  <app-navbar layout="log-sign"></app-navbar>

  <section class="forgot-password-page__content">
    <article class="forgot-password-card">
      <h1 class="forgot-password-card__title text-28-black-uc text-main-color">Reset password</h1>
      <p class="forgot-password-card__description text-12-regular text-muted-color">
        Enter your email address and we will send you a link to reset your password.
      </p>

      <div class="forgot-password-card__form">
        <app-auth-input
          label="EMAIL"
          placeholder="Enter your email"
          type="email"
        ></app-auth-input>
      </div>

      <div class="forgot-password-card__actions">
        <app-button
          variant="log-in"
          [labelOverride]="'SEND RESET LINK'"
          [fullWidth]="true"
        ></app-button>
      </div>

      <p class="forgot-password-card__back text-12-regular">
        <a routerLink="/login" class="forgot-password-card__back-link text-muted-color">Back to sign in</a>
      </p>
    </article>
  </section>

  <app-footer></app-footer>
</main>
