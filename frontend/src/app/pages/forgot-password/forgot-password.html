<main class="forgot-password-page">
  <app-navbar variant="log-sign"></app-navbar>

  <section class="forgot-password-page__content">
    <article class="forgot-password-card">
      <h1 class="forgot-password-card__title text-28-black-uc text-main-color">Przypomnienie hasła</h1>
      <p class="forgot-password-card__description text-12-regular text-muted-color">
        Podaj adres e-mail, a wyślemy Ci link do zresetowania hasła.
      </p>

      <div class="forgot-password-card__form">
        <app-auth-input
          label="ADRES E-MAIL"
          placeholder="Wpisz swój email"
          type="email"
        ></app-auth-input>

        <app-button
          variant="log-in"
          [labelOverride]="'WYŚLIJ LINK RESETUJĄCY'"
          [fullWidth]="true"
        ></app-button>
      </div>

      <a routerLink="/login" class="forgot-password-card__back text-12-regular text-muted-color">
        Wróć do logowania
      </a>
    </article>
  </section>

  <app-footer></app-footer>
</main>
