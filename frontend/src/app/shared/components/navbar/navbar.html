<nav class="navbar" aria-label="Main navigation">
  <button
    type="button"
    class="navbar__logo-button"
    aria-label="Go to home page"
    (click)="goToHome()"
  >
    <span class="navbar__logo text-28-black-uc text-main-color">MOVIEGUESS</span>
  </button>

  <ul *ngIf="showLinks" class="navbar__links" aria-label="Primary links">
    <li *ngFor="let link of links" class="navbar__link">
      <button
        type="button"
        class="navbar__link-button text-16-semi-bold text-muted-color"
        (click)="onLinkClick(link)"
      >
        {{ link.label }}
      </button>
    </li>
  </ul>

  <div *ngIf="showUserCompact" class="navbar__user">
    <span class="navbar__username text-16-semi-bold text-main-color" aria-live="polite">
      {{ displayName() || 'Profil' }}
    </span>
    <button
      type="button"
      class="navbar__avatar-button navbar__avatar"
      aria-label="Go to profile"
      (click)="goToProfile()"
    >
      <img
        *ngIf="navbarAvatarUrl() as navSrc"
        [src]="navSrc"
        alt=""
        class="navbar__avatar-img"
        width="40"
        height="40"
        loading="lazy"
      />
      <span *ngIf="!navbarAvatarUrl()" class="navbar__avatar-fallback" aria-hidden="true">?</span>
    </button>
  </div>

  <app-button
    *ngIf="showGuestAuthButton"
    variant="sign-up-log-in"
    (click)="goToLogin()"
  ></app-button>

  <div *ngIf="showUserWallet" class="navbar__wallet-group">
    <div class="navbar__wallet text-16-bold">
      <span>🎟️ {{ walletLabel }}</span>
    </div>
    <button
      type="button"
      class="navbar__avatar-button navbar__avatar"
      aria-label="Go to profile"
      (click)="goToProfile()"
    >
      <img
        *ngIf="navbarAvatarUrl() as navSrc"
        [src]="navSrc"
        alt=""
        class="navbar__avatar-img"
        width="40"
        height="40"
        loading="lazy"
      />
      <span *ngIf="!navbarAvatarUrl()" class="navbar__avatar-fallback" aria-hidden="true">?</span>
    </button>
  </div>
</nav>
