<div class="guess-row">
  <div
    *ngFor="let tile of tiles; let i = index"
    class="guess-row__tile"
    [class.guess-row__tile--year]="i === 1"
    [class.guess-row__tile--flex]="i !== 1"
  >
    <app-attribute-tile [state]="tile.state" [text]="tile.text || 'TEKST'"></app-attribute-tile>
  </div>
</div>
