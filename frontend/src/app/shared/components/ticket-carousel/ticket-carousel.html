<section class="ticket-carousel" aria-label="Category ticket carousel">
  <div class="ticket-carousel__embla embla">
    <div
      #viewport
      class="ticket-carousel__viewport embla__viewport"
      (mouseenter)="pauseAutoplay()"
      (mouseleave)="resumeAutoplay()"
      (focusin)="pauseAutoplay()"
      (focusout)="resumeAutoplay()"
    >
      <div class="ticket-carousel__container embla__container">
        <div
          *ngFor="let item of items; let i = index"
          class="ticket-carousel__slide embla__slide"
        >
          <button
            type="button"
            class="ticket-carousel__ticket-button"
            (click)="selectCategory(i)"
            [attr.aria-label]="'Go to category ' + item.label"
          >
            <div class="ticket-carousel__ticket-scene">
              <div class="ticket-carousel__ticket-scale">
              <app-ticket [title]="item.label.toUpperCase()" [theme]="getThemeForSlug(item.slug)" />
              </div>
            </div>
          </button>
        </div>
      </div>
    </div>
  </div>

  <p class="ticket-carousel__category text-24-black-uc text-main-color">
    {{ activeCategory }}
  </p>

  <div class="ticket-carousel__controls">
    <button
      type="button"
      class="ticket-carousel__control-btn"
      aria-label="Previous category"
      (click)="previous()"
      [disabled]="!canScrollPrev && items.length <= 1"
    >
      <span class="ticket-carousel__control-icon" aria-hidden="true">‹</span>
    </button>
    <button
      type="button"
      class="ticket-carousel__control-btn"
      aria-label="Next category"
      (click)="next()"
      [disabled]="!canScrollNext && items.length <= 1"
    >
      <span class="ticket-carousel__control-icon" aria-hidden="true">›</span>
    </button>
  </div>
</section>
