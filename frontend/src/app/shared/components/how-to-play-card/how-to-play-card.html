<article class="how-card">
  <div class="how-card__icon-wrap" aria-hidden="true">
    <span class="how-card__icon">🎟️</span>
  </div>

  <h3 class="how-card__title text-22-bold text-main-color">{{ step }}. {{ title }}</h3>

  <p class="how-card__description text-15-regular text-muted-color">
    {{ description }}
  </p>
</article>
