<label class="auth-input">
  <span class="auth-input__label text-12-semi-bold-uc text-muted-color">{{ label }}</span>
  <input
    class="auth-input__field text-12-regular text-main-color"
    [class.auth-input__field--focused]="focused"
    [type]="type"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [attr.autocomplete]="autocomplete || null"
    [value]="value()"
    (input)="value.set(($any($event.target).value))"
  />
</label>
